name: Build luci-app-xray for OpenWrt 24.10

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CACHE_DIR: ~/cache

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # 如果 opkg print-architecture 看到的是 x86_64，可直接用这组
          - name: x86_64
            sdk_url_path: https://downloads.openwrt.org/releases/24.10.5/targets/x86/64
            sdk_name: -sdk-24.10.5-x86-64_

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache gettext libncurses5-dev xsltproc \
            p7zip-full zstd wget file tar unzip

      - name: Prepare directories
        run: |
          echo "SDK_HOME=$(mktemp -d)" >> "$GITHUB_ENV"
          echo "CACHE_DIR_SDK=$HOME/cache/sdk" >> "$GITHUB_ENV"
          echo "CACHE_DIR_DL=$HOME/cache/dl" >> "$GITHUB_ENV"
          echo "CACHE_DIR_FEEDS=$HOME/cache/feeds" >> "$GITHUB_ENV"
          mkdir -p "$HOME/cache/sdk" "$HOME/cache/dl" "$HOME/cache/feeds" "$HOME/.ccache"

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CACHE_DIR_SDK }}
            ${{ env.CACHE_DIR_DL }}
            ${{ env.CACHE_DIR_FEEDS }}
            ~/.ccache
          key: openwrt-${{ matrix.name }}-${{ github.sha }}
          restore-keys: |
            openwrt-${{ matrix.name }}-

      - name: Download and extract SDK
        run: |
          cd "$CACHE_DIR_SDK"

          wget -q -O - "${{ matrix.sdk_url_path }}/sha256sums" | \
            grep -- "${{ matrix.sdk_name }}" > sha256sums.small

          SDK_FILE="$(cut -d' ' -f2 sha256sums.small | sed 's/*//g')"
          test -n "$SDK_FILE"

          if [ ! -f "$SDK_FILE" ]; then
            wget -q "${{ matrix.sdk_url_path }}/$SDK_FILE"
          fi

          sha256sum -c sha256sums.small

          # 兼容 OpenWrt SDK 常见压缩格式
          7z x "$SDK_FILE" -so | tar -C "$SDK_HOME" -xvf - --strip=1

      - name: Prepare SDK
        run: |
          cd "$SDK_HOME"

          rm -rf dl feeds
          ln -s "$CACHE_DIR_DL" dl
          ln -s "$CACHE_DIR_FEEDS" feeds

          cp feeds.conf.default feeds.conf

          sed -i 's#git.openwrt.org/openwrt/openwrt#github.com/openwrt/openwrt#' feeds.conf || true
          sed -i 's#git.openwrt.org/feed/packages#github.com/openwrt/packages#' feeds.conf || true
          sed -i 's#git.openwrt.org/project/luci#github.com/openwrt/luci#' feeds.conf || true
          sed -i 's#git.openwrt.org/feed/telephony#github.com/openwrt/telephony#' feeds.conf || true

      - name: Update feeds and install package
        run: |
          cd "$SDK_HOME"
          ./scripts/feeds update -a

          # 把当前仓库挂到 SDK 里
          ln -s "${{ github.workspace }}" package/luci-app-xray

          ./scripts/feeds install -a

      - name: Build packages
        run: |
          cd "$SDK_HOME"
          make defconfig

          # 主包
          make package/luci-app-xray/core/clean V=s
          make package/luci-app-xray/core/compile V=s

          # 状态页包
          make package/luci-app-xray/status/compile V=s

          # 如需 geodata 页面，再取消下面这行注释
          # make package/luci-app-xray/geodata/compile V=s

      - name: Collect ipk
        run: |
          find "$SDK_HOME/bin" -type f -name "luci-app-xray*.ipk" -exec cp {} "${{ github.workspace }}/" \;
          ls -lh ./*.ipk

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./*.ipk
